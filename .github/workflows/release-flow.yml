name: Release Flow

on:
  workflow_dispatch:
    inputs:
      staging_api_base_url:
        description: "Staging API base URL (example: https://staging-api.example.com)"
        required: true
        type: string
      canary_api_base_url:
        description: "Canary API base URL (example: https://canary-api.example.com)"
        required: true
        type: string
      production_api_base_url:
        description: "Production API base URL (example: https://api.example.com)"
        required: true
        type: string
      canary_observe_minutes:
        description: "Canary observation duration in minutes"
        required: false
        default: "15"
        type: string

concurrency:
  group: release-flow-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight Gates
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b
        with:
          version: "0.10.4"
          enable-cache: true
          cache-python: true

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run release preflight
        run: bash scripts/release/preflight.sh

  staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: preflight
    environment: staging
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Validate staging deploy command
        env:
          DEPLOY_CMD: ${{ vars.STAGING_DEPLOY_COMMAND }}
        run: |
          if [[ -z "${DEPLOY_CMD}" ]]; then
            echo "Missing vars.STAGING_DEPLOY_COMMAND in staging environment"
            exit 1
          fi
      - name: Deploy to staging
        env:
          API_BASE_URL: ${{ inputs.staging_api_base_url }}
          DEPLOY_CMD: ${{ vars.STAGING_DEPLOY_COMMAND }}
          STAGING_ROLLOUT_COMMAND: ${{ vars.STAGING_ROLLOUT_COMMAND }}
          CLOUD_API_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          bash -lc "${DEPLOY_CMD}"

      - name: Staging smoke
        run: bash scripts/release/post_deploy_smoke.sh "${{ inputs.staging_api_base_url }}"

  canary:
    name: Deploy Canary
    runs-on: ubuntu-latest
    needs: staging
    environment: canary
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Validate canary deploy command
        env:
          DEPLOY_CMD: ${{ vars.CANARY_DEPLOY_COMMAND }}
        run: |
          if [[ -z "${DEPLOY_CMD}" ]]; then
            echo "Missing vars.CANARY_DEPLOY_COMMAND in canary environment"
            exit 1
          fi
      - name: Deploy to canary
        env:
          API_BASE_URL: ${{ inputs.canary_api_base_url }}
          DEPLOY_CMD: ${{ vars.CANARY_DEPLOY_COMMAND }}
          CANARY_ROLLOUT_COMMAND: ${{ vars.CANARY_ROLLOUT_COMMAND }}
          CLOUD_API_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          bash -lc "${DEPLOY_CMD}"

      - name: Observe canary window
        run: |
          mins="${{ inputs.canary_observe_minutes }}"
          if ! [[ "${mins}" =~ ^[0-9]+$ ]]; then
            echo "Invalid canary_observe_minutes: ${mins}"
            exit 1
          fi
          sleep "$((mins * 60))"

      - name: Canary smoke
        run: bash scripts/release/post_deploy_smoke.sh "${{ inputs.canary_api_base_url }}"

  production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: canary
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Validate production deploy command
        env:
          DEPLOY_CMD: ${{ vars.PRODUCTION_DEPLOY_COMMAND }}
        run: |
          if [[ -z "${DEPLOY_CMD}" ]]; then
            echo "Missing vars.PRODUCTION_DEPLOY_COMMAND in production environment"
            exit 1
          fi
      - name: Deploy to production
        env:
          API_BASE_URL: ${{ inputs.production_api_base_url }}
          DEPLOY_CMD: ${{ vars.PRODUCTION_DEPLOY_COMMAND }}
          PRODUCTION_ROLLOUT_COMMAND: ${{ vars.PRODUCTION_ROLLOUT_COMMAND }}
          CLOUD_API_TOKEN: ${{ secrets.CLOUD_API_TOKEN }}
          KUBE_CONFIG_B64: ${{ secrets.KUBE_CONFIG_B64 }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          bash -lc "${DEPLOY_CMD}"

      - name: Production smoke
        run: bash scripts/release/post_deploy_smoke.sh "${{ inputs.production_api_base_url }}"
